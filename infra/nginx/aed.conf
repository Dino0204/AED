# nginx reverse proxy for AED n8n.
# 도메인은 AED_HOST 환경변수 값으로 치환 (배포 시 envsubst 또는 sed로 처리).
# 인증서는 certbot이 /etc/letsencrypt/live/${AED_HOST}/ 에 발급.
# HTTP — Let's Encrypt 갱신용 + HTTPS redirect
server {
    listen 80;
    listen [::]:80;
    server_name AED_HOST_PLACEHOLDER;

    # certbot webroot challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS — n8n 프록시
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name AED_HOST_PLACEHOLDER;

    ssl_certificate     /etc/letsencrypt/live/AED_HOST_PLACEHOLDER/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/AED_HOST_PLACEHOLDER/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # n8n 전체를 root에 노출. webhook은 /webhook/*, UI는 그 외.
    location / {
        proxy_pass http://n8n:5678;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # n8n UI WebSocket 지원
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 600s;
    }

    client_max_body_size 16m;
}
